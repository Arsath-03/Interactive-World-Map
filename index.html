<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Clickable World Map</title>
</head>

<body>
    <center><h1>World Map</h1>
    <p>Click on a continent to view details.</p>
<img src="https://worldmapblank.com/wp-content/uploads/2020/12/World-Map-with-Continents.jpg" usemap="#worldmap" alt="World Map" width="800"></center>

    
    

    
    <map name="worldmap">

        
        <area shape="rect" coords="360,300,460,430" href="africa.html" alt="Africa">

        
        <area shape="rect" coords="460,180,680,360" href="asia.html" alt="Asia">

        
        <area shape="rect" coords="600,380,730,480" href="australia.html" alt="Australia">

        
        <area shape="rect" coords="360,180,460,280" href="europe.html" alt="Europe">

        
        <area shape="rect" coords="80,120,300,300" href="north-america.html" alt="North America">

        
        <area shape="rect" coords="200,320,330,520" href="south-america.html" alt="South America">

    </map>

</body>

</html>
